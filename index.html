<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWiNFO Benchmark Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <!-- Upload View -->
    <div id="upload-view">
        <div class="upload-container">
            <h1>HWiNFO Benchmark Analyzer</h1>
            <p class="upload-subtitle">Analyze HWiNFO64 CSV logs</p>
            <div id="drop-zone" tabindex="0" role="button" aria-label="Upload CSV files">
                <div class="drop-zone-content">
                    <span class="drop-zone-label">Drop CSV files here or click to browse</span>
                    <span class="drop-hint">Supports multiple files</span>
                </div>
            </div>
            <input type="file" id="file-input" accept=".csv,.CSV" multiple hidden>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="hidden">
        <!-- Top Bar -->
        <header id="top-bar">
            <div class="top-bar-left">
                <button id="back-btn" title="Upload new files">&larr;</button>
                <div class="file-tabs" id="file-tabs"></div>
            </div>
            <div class="top-bar-right">
                <div class="run-info" id="run-info"></div>
                <button id="export-btn" class="btn-export">Export Summary</button>
            </div>
        </header>

        <!-- Alerts -->
        <section id="alerts-section" class="hidden"></section>

        <!-- Key Metrics -->
        <section id="metrics-section">
            <div class="metrics-grid" id="metrics-grid"></div>
        </section>

        <!-- Charts -->
        <section id="charts-section">
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Framerate</h3>
                    <canvas id="chart-fps"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Temperature</h3>
                    <canvas id="chart-temp"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Clock Speeds</h3>
                    <canvas id="chart-clocks"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Power &amp; Usage</h3>
                    <canvas id="chart-power"></canvas>
                </div>
            </div>
        </section>

        <!-- Worth Checking -->
        <section id="worth-checking-section" class="hidden">
            <div class="worth-checking-container">
                <div class="worth-checking-header">
                    <span>Worth Checking</span>
                    <span class="worth-checking-subtitle">- not alarming, but may be worth a look</span>
                </div>
                <div id="worth-checking-items"></div>
            </div>
        </section>

        <!-- All Stats -->
        <section id="all-stats-section">
            <button id="toggle-all-stats" class="section-toggle">
                <span>All Statistics</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <div id="all-stats-content" class="hidden"></div>
        </section>
    </div>

    <!-- Hidden Export Template -->
    <div id="export-template" class="export-template"></div>

    <script src="app.js"></script>
</body>
</html>
